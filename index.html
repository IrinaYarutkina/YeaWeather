<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YeaWeather</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <nav class="header__nav">
        <!-- левая часть -->
        <div class="header__nav-left">
          <a
            href="/"
            class="header__logo"
            aria-label="WeatherMe - Главная страница"
          >
            <img
              src="assets/images/cloud_logo.svg"
              alt="WeatherMe - Прогноз погоды"
              width="65"
              class="header__logo-icon"
            />
          </a>
          <span class="header__text"> WeatherMe </span>
          <div id="clock">00:00</div>
          <!-- переключатель -->
          <div class="header__switch">
            <span class="header__switch-label header__switch-c">°C</span>
            <div class="header__switch-toggle"></div>
            <span class="header__switch-label header__switch-f">°F</span>
          </div>
        </div>
        <!-- правая часть -->
        <div class="header__nav-right">
          <ul class="header__menu">
            <li class="header__menu-item">Сегодня</li>
            <li class="header__menu-item">Завтра</li>
          </ul>
        </div>
      </nav>
    </header>
    <main>
      <!-- форма поиска -->
      <div class="search">
        <form action="/search" method="GET">
          <input
            type="search"
            class="search__input"
            id="search__input"
            placeholder="Введите название города..."
          />
        </form>
        <button type="submit" class="search__button" id="search__button">
          Найти
        </button>
      </div>

      <!-- основная карточка погоды -->
      <section class="weather-card">
        <div class="weather-card__meta">
          <div class="weather-card__city">
            <span id="weather-city-name">Город</span>
            <img
              src="/YeaWeather/assets/images/city.svg"
              alt="location"
              class="city__icon"
            />
          </div>
          <div class="weather-card__datetime">
            <div class="weather-card__date" id="weather-card__date">
              Текущая дата
            </div>
            <!-- <div class="weather-card__time" id="weather-card__time">
              Местное время
            </div> -->
          </div>
        </div>
        <div class="weather-card__temperature">
          <img
            class="weather-card__temperature-icon"
            src="/YeaWeather/assets/images/temperature_icon.png"
            alt="Температура"
          />
          <span
            class="weather-card__temperature-value"
            id="weather-card__temperature"
          >
            Температура
          </span>
          <img
            class="weather-card__weather-icon"
            id="weather-card__weather-icon"
            src=""
            alt="Иконка погоды"
          />
        </div>

        <div class="weather-card__details">
          <span
            class="weather-card__detail weather-card__detail-label--humidity"
            >Влажность</span
          >
          <span
            class="weather-card__detail weather-card__detail-label--pressure"
            >Атм. давление</span
          >
          <span class="weather-card__detail weather-card__detail-label--wind"
            >Ветер</span
          >
          <!-- динамические данные -->
          <span
            class="weather-card__detail weather-card__detail-value--humidity"
            id="humidity"
          ></span>
          <span
            class="weather-card__detail weather-card__detail-value--pressure"
            id="pressure"
          ></span>
          <span
            class="weather-card__detail weather-card__detail-value--wind"
            id="wind"
          ></span>
        </div>
      </section>

      <!-- погода по часам -->
      <div class="weather-hour">
        <!-- шесть карточек -->
        <ul class="weather-hour__list">
          <li class="weather-hour__list-card">
            <div class="weather__dark-bottom"></div>
          </li>
          <li class="weather-hour__list-card">
            <div class="weather__dark-bottom"></div>
          </li>
          <li class="weather-hour__list-card">
            <div class="weather__dark-bottom"></div>
          </li>
          <li class="weather-hour__list-card">
            <div class="weather__dark-bottom"></div>
          </li>
          <li class="weather-hour__list-card">
            <div class="weather__dark-bottom"></div>
          </li>
          <li class="weather-hour__list-card">
            <div class="weather__dark-bottom"></div>
          </li>
        </ul>
      </div>
    </main>
    <footer class="footer">
      <div class="footer__container">
        <p class="footer__description">Данные использованы OpenWeatherAPI.</p>
        <div class="footer__copy">© 2026 WeatherMe. Учебный проект</div>
      </div>
    </footer>

    <script src="/YeaWeather/script.js"></script>
  </body>
</html>
