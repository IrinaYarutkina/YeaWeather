<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YeaWeather</title>
    <link rel="stylesheet" href="/Style/style.css" />
    <link rel="stylesheet" href="/Style/normalize.css" />
  </head>
  <body>
    <header class="header">
      <nav class="header__nav">
        <!-- левая часть -->
        <div class="header__nav-left">
          <a
            href="/index.html"
            class="header__logo"
            aria-label="WeatherMe - Главная страница"
          >
            <img
              src="assets/images/cloud_logo.svg"
              alt="WeatherMe - Прогноз погоды"
              width="65"
              class="header__logo-icon"
            />
          </a>
          <a class="header__text" href="/index.html"> WeatherMe </a>
          <div id="clock">00:00</div>
          <!-- переключатель -->
          <div class="header__switch">
            <span class="header__switch-label header__switch-c">°C</span>
            <div class="header__switch-toggle"></div>
            <span class="header__switch-label header__switch-f">°F</span>
          </div>
        </div>
        <!-- правая часть -->
        <div class="header__nav-right">
          <ul class="header__menu">
            <li class="header__menu-item">
              <a class="header__menu-link" id="todayLink" href="/index.html"
                >Сегодня</a
              >
            </li>
            <li class="header__menu-item">
              <a class="header__menu-link" id="tomorrow" href="/index.html"
                >Завтра</a
              >
            </li>
            <li class="header__menu-item">
              <a class="header__menu-link" id="weekLink" href="/week.html"
                >На 5 дней</a
              >
            </li>
          </ul>
        </div>
      </nav>
    </header>
    <main>
      <!-- форма поиска -->
      <div class="search">
        <form id="searchForm">
          <input
            type="search"
            class="search__input"
            id="search__input"
            placeholder="Введите название города..."
          />
          <button type="submit" class="search__button" id="search__button">
            Найти
          </button>
        </form>
      </div>

      <!-- основная карточка погоды -->
      <section class="weather__card">
        <div class="weather__card__meta">
          <div class="weather__card__city">
            <span id="weather-city-name">город</span>
            <img
              src="./assets/images/city.svg"
              alt="location"
              class="city__icon"
            />
          </div>
          <div class="weather__card__datetime">
            <div class="weather__card__date" id="weather__card__date">дата</div>
          </div>
        </div>
        <div class="weather__card__temperature">
          <img
            class="weather__card__temperature-icon"
            src="./assets/images/temperature_icon.png"
            alt="Температура"
          />
          <span
            class="weather__card__temperature-value"
            id="weather__card__temperature"
          >
            t
          </span>
          <img
            class="weather__card__weather-icon"
            id="weather__card__weather-icon"
            src=""
            alt="Иконка погоды"
          />
        </div>

        <div class="weather__card__details">
          <span
            class="weather__card__detail weather__card__detail-label--humidity"
            >Влажность</span
          >
          <span
            class="weather__card__detail weather__card__detail-label--pressure"
            >Атм. давление</span
          >
          <span class="weather__card__detail weather__card__detail-label--wind"
            >Ветер</span
          >
          <!-- динамические данные -->
          <span
            class="weather__card__detail weather__card__detail-value--humidity"
            id="humidity"
          ></span>
          <span
            class="weather__card__detail weather__card__detail-value--pressure"
            id="pressure"
          ></span>
          <span
            class="weather__card__detail weather__card__detail-value--wind"
            id="wind"
          ></span>
        </div>
      </section>

      <!-- погода через каждые три часа -->
      <div class="weather-hour">
        <scroll-slider class="scroll-slider">
          <scroll-slider-prev-button
            tabindex="0"
            hidden
            class="scroll-slider-button _prev"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
          </scroll-slider-prev-button>
          <scroll-slider-next-button
            tabindex="0"
            class="scroll-slider-button _next"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
          </scroll-slider-next-button>

          <!-- cлайдер с краточками -->
          <scroll-slider-track class="weather-hour__list">
            <!-- <article class="weather-hour__list-card">
              <div class="weather-hour__info">
                <span> время </span>
                <img class="weather-hour__info-icon" src="" alt="погода" />
                <span> temp</span>
              </div>
            </article> -->
          </scroll-slider-track>
        </scroll-slider>
      </div>
    </main>

    <footer class="footer">
      <div class="footer__container">
        <p class="footer__description">Данные использованы OpenWeatherAPI.</p>
        <div class="footer__copy">© 2026 WeatherMe. Учебный проект</div>
      </div>
    </footer>

    <script type="module" src="./script.js"></script>
  </body>
</html>
