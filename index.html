<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YeaWeather</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <nav class="header__nav">
        <!-- левая часть -->
        <div class="header__nav-left">
          <a
            href="/"
            class="header__logo"
            aria-label="WeatherMe - Главная страница"
          >
            <img
              src="/assets/images/cloud_logo.svg"
              alt="WeatherMe - Прогноз погоды"
              width="65"
              class="header__logo-icon"
            />
            <span class="header__logo-text"> WeatherMe </span>
          </a>
          <div id="clock">00:00</div>
          <!-- переключатель -->
          <div class="header__switch">
            <span class="header__switch-label header__switch-c">°C</span>
            <div class="header__switch-toggle"></div>
            <span class="header__switch-label header__switch-f">°F</span>
          </div>
        </div>
        <!-- правая часть -->
        <div class="header__nav-right">
          <ul class="header__menu">
            <li class="header__menu-item">Сегодня</li>
            <li class="header__menu-item">Завтра</li>
            <li class="header__menu-item">На месяц</li>
          </ul>
        </div>
      </nav>
    </header>
    <main>
      <!-- форма поиска -->
      <div class="search">
        <form action="/search" method="GET">
          <input
            type="search"
            class="search__input"
            placeholder="Введите город..."
          />
        </form>
        <button type="submit" class="search__button">Найти</button>
      </div>

      <!-- слайдер карточки городов -->
      <section class="slider">
        <button class="slider__btn back">
          <svg
            width="26"
            height="42"
            viewBox="0 0 26 42"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M21 5L5 21L21 37"
              stroke="black"
              stroke-width="10"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>

        <ul class="slider__list">
          <li class="slider__item"></li>
        </ul>

        <button class="slider__btn next">
          <svg
            width="26"
            height="42"
            viewBox="0 0 26 42"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M5 37L21 21L5 5"
              stroke="black"
              stroke-width="10"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
      </section>

      <!-- погода по часам -->
      <div class="weather-hour">
        <!-- шесть карточек -->
        <ul class="weather-hour__list">
          <li class="weather-hour__list-card">
            <div class="weather__card-bottom"></div>
          </li>
          <li class="weather-hour__list-card">
            <div class="weather__card-bottom"></div>
          </li>
          <li class="weather-hour__list-card">
            <div class="weather__card-bottom"></div>
          </li>
          <li class="weather-hour__list-card">
            <div class="weather__card-bottom"></div>
          </li>
          <li class="weather-hour__list-card">
            <div class="weather__card-bottom"></div>
          </li>
          <li class="weather-hour__list-card">
            <div class="weather__card-bottom"></div>
          </li>
        </ul>
      </div>
    </main>
    <footer class="footer">
      <div class="footer__container">
        <p class="footer__description">Данные использованы погодным API.</p>
        <div class="footer__copy">© 2026 WeatherMe. Учебный проект</div>
      </div>
    </footer>

    <script src="/script.js"></script>
  </body>
</html>
